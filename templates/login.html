<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Operator login</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #f9fafb; color: #1f2937; }
      .card {
        max-width: 320px; margin: 12vh auto; background: #fff; padding: 28px;
        border: 1px solid #e5e7eb; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.06);
      }
      h1 { font-size: 18px; margin: 0 0 16px; }
      label { display: block; font-size: 13px; margin: 12px 0 4px; }
      input { width: 100%; padding: 9px 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
      button { margin-top: 18px; width: 100%; padding: 10px; border: none; border-radius: 6px;
               background: #2563eb; color: #fff; font-size: 14px; cursor: pointer; }
      .err { color: #b91c1c; font-size: 13px; margin-top: 10px; }
    </style>
  </head>
  <body>
    <form class="card" method="post">
      {% csrf_token %}
      <h1>Operator login</h1>
      <label for="id_username">Username</label>
      {{ form.username }}
      <label for="id_password">Password</label>
      {{ form.password }}
      {% if form.errors %}<div class="err">Invalid username or password.</div>{% endif %}
      <button type="submit">Sign in</button>
    </form>
  </body>
</html>
