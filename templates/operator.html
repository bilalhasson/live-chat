{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Operator inbox</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, sans-serif; color: #111827; height: 100vh; display: flex; flex-direction: column; }
      header { display: flex; align-items: center; justify-content: space-between;
               padding: 10px 16px; background: #111827; color: #fff; font-size: 14px; }
      header a { color: #93c5fd; font-size: 13px; }
      header form { margin: 0; }
      #logout { background: none; border: none; color: #93c5fd; font-size: 13px; cursor: pointer; padding: 0; }
      #status { font-size: 12px; opacity: .8; }
      main { flex: 1; display: flex; min-height: 0; }
      #list { width: 280px; border-right: 1px solid #e5e7eb; overflow-y: auto; }
      .conv { padding: 12px 14px; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
      .conv:hover { background: #f9fafb; }
      .conv.active { background: #eff6ff; }
      .conv .who { font-weight: 600; font-size: 13px; display: flex; align-items: center; }
      .conv .site { margin-left: 6px; font-weight: 400; font-size: 11px; color: #9ca3af; }
      .conv .preview { font-size: 12px; color: #6b7280; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; margin-right: 6px; flex: none; }
      .badge { margin-left: auto; background: #ef4444; color: #fff; font-size: 11px; border-radius: 10px; padding: 1px 7px; }
      #thread-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
      #thread-header { padding: 8px 16px; border-bottom: 1px solid #e5e7eb; background: #fff;
                       display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      #thread-header.hidden { display: none; }
      #thread-header > div { min-width: 0; }
      #end-chat { flex: none; border: 1px solid #ef4444; background: #fff; color: #ef4444;
                  font-size: 13px; border-radius: 6px; padding: 5px 12px; cursor: pointer; }
      #end-chat:hover { background: #ef4444; color: #fff; }
      #thread-header .th-name { font-weight: 600; font-size: 14px; }
      #thread-header .th-meta { font-size: 12px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      #canned-menu { position: absolute; left: 8px; right: 8px; bottom: 52px; max-height: 220px; overflow-y: auto;
                     background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 -4px 16px rgba(0,0,0,.12); }
      #canned-menu.hidden { display: none; }
      .canned-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f3f4f6; }
      .canned-item:last-child { border-bottom: none; }
      .canned-item.sel { background: #eff6ff; }
      .canned-item .t { font-weight: 600; font-size: 13px; }
      .canned-item .b { font-size: 12px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      #thread { flex: 1; overflow-y: auto; padding: 16px; background: #fafafa; }
      .msg { max-width: 70%; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; font-size: 14px; line-height: 1.35; }
      .msg.visitor { background: #fff; border: 1px solid #e5e7eb; }
      .msg.operator { background: #2563eb; color: #fff; margin-left: auto; }
      #typing { display: none; padding: 4px 16px; font-size: 12px; color: #6b7280; font-style: italic; background: #fafafa; }
      #composer { display: flex; border-top: 1px solid #e5e7eb; }
      #composer input { flex: 1; border: none; padding: 14px 16px; font-size: 14px; outline: none; }
      #composer input:disabled { background: #f3f4f6; }
      #suggest { border: none; border-left: 1px solid #e5e7eb; background: #eef2ff; color: #4f46e5;
                 font-size: 13px; padding: 0 14px; cursor: pointer; white-space: nowrap; }
      #suggest:disabled { color: #9ca3af; background: #f3f4f6; cursor: default; }
      #suggest.hidden { display: none; }
      #empty { margin: auto; color: #9ca3af; font-size: 14px; }
    </style>
  </head>
  <body>
    <header>
      <span>Operator inbox <span id="status">connecting…</span></span>
      <!-- Django 5.x LogoutView is POST-only; a GET link would 405 and NOT log out. -->
      <form method="post" action="/logout/">
        {% csrf_token %}
        <button id="logout" type="submit">Log out</button>
      </form>
    </header>
    <main>
      <div id="list"></div>
      <div id="thread-wrap">
        <div id="thread-header" class="hidden"></div>
        <div id="thread"><div id="empty">Select a conversation</div></div>
        <div id="typing"></div>
        <div id="canned-menu" class="hidden"></div>
        <div id="composer">
          <input id="reply" type="text" placeholder="Select a conversation to reply…" disabled />
          <button id="suggest" class="hidden" type="button" disabled title="Draft a reply with AI">✨ Suggest</button>
        </div>
      </div>
    </main>

    <script src="{% static 'operator/operator.js' %}"></script>
  </body>
</html>
