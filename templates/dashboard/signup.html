<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign up</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #f9fafb; color: #1f2937; }
      .card { max-width: 360px; margin: 10vh auto; background: #fff; padding: 28px;
              border: 1px solid #e5e7eb; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.06); }
      h1 { font-size: 20px; margin: 0 0 6px; }
      p.sub { margin: 0 0 16px; color: #6b7280; font-size: 14px; }
      label { display: block; font-size: 13px; margin: 12px 0 4px; }
      input { width: 100%; padding: 9px 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
      button { margin-top: 18px; width: 100%; padding: 10px; border: none; border-radius: 6px;
               background: #2563eb; color: #fff; font-size: 14px; cursor: pointer; }
      ul.errorlist { color: #b91c1c; font-size: 13px; padding-left: 18px; }
      .helptext { font-size: 12px; color: #6b7280; }
      .foot { margin-top: 16px; font-size: 13px; text-align: center; }
    </style>
  </head>
  <body>
    <form class="card" method="post">
      {% csrf_token %}
      <h1>Create your account</h1>
      <p class="sub">Sign up to create a chat widget for your site.</p>
      {{ form.as_p }}
      <button type="submit">Sign up</button>
      <p class="foot">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
    </form>
  </body>
</html>
